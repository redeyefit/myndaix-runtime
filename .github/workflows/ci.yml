name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # The Postgres-backed suites drop/recreate their own schema each run
    # (init_schema), so an empty database is all they need.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LEDGER_TEST_DSN: postgresql://postgres:postgres@localhost:5432/runtime_test
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Run all test suites
        run: |
          set -e
          for t in tests/test_*.py; do
            echo "== $t =="
            python "$t"
          done
