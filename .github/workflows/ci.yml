name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # The Postgres-backed suites drop/recreate their own schema each run
    # (init_schema), so an empty database is all they need.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LEDGER_TEST_DSN: postgresql://postgres:postgres@localhost:5432/runtime_test
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"          # dev extra brings pytest (+ pytest-asyncio)

      - name: Run all test suites
        run: |
          set -e
          # Two test styles coexist: most suites are standalone (a `__main__` runner that
          # drives async via asyncio.run); test_stitch.py is pytest-style (fixtures/marks, no
          # runner). Route by the presence of a `__main__` block so each runs the right way —
          # running a pytest-style file as a bare script collects nothing and errors on import.
          for t in tests/test_*.py; do
            if grep -q '^if __name__' "$t"; then
              echo "== python $t =="; python "$t"
            else
              echo "== pytest $t =="; python -m pytest -q "$t"
            fi
          done

      - name: Bash quality (shellcheck + our semgrep bug-rules + bats)
        # bash-heavy repo; CodeQL doesn't cover bash. bash-check ERROR-gates (shellcheck + the custom
        # bug-rules + pipefail); bats runs the shell test suite. See tools/README.md.
        run: |
          set -e
          pip install semgrep
          sudo apt-get update -qq && sudo apt-get install -y -qq bats shellcheck
          ./tools/bash-check.sh
          bats tests/bash/

      - name: Substrate smoke + security harness
        # Fixture-only; portable (plistlib not macOS plutil; shellcheck skipped if absent). Catches
        # a stale migration_head.txt pin, config-parser/denylist regressions, quiesce-list drift.
        run: bash substrate/test.sh

      - name: Migration additivity lint (changed migrations vs main)
        # Belt-and-suspenders enforcement of §2.8 at PR time (reconcile enforces at deploy). Lints
        # only the migrations ADDED/MODIFIED/RENAMED vs the merge-base — a contraction fails CI.
        run: |
          git fetch --no-tags --depth=200 origin main || true
          base="$(git merge-base origin/main HEAD 2>/dev/null || true)"
          if [ -z "$base" ]; then echo "no merge-base with origin/main — skipping (reconcile enforces at deploy)"; exit 0; fi
          changed="$(git diff --diff-filter=AMR --name-only "$base"..HEAD -- 'src/runtime/ledger/migrations/*.sql' || true)"
          if [ -z "$changed" ]; then echo "no migration changes vs main"; exit 0; fi
          echo "linting changed migrations:"; echo "$changed"
          # shellcheck disable=SC2086
          python substrate/migration_lint.py $changed
